name: Deploy

# `pulumi up` uploads the Worker's static assets (pulumi-cloudflare, bridged
# from the CF v5 provider), so the deploy IS pulumi up — no wrangler.
# Bootstrap/secrets: see infra/README.md.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'plan (preview) or apply (deploy)'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  # Privileged: holds secrets, env-gated.
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production # add required reviewers in repo settings
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Optional custom domain.
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      # Object Storage (Linode) key for the Pulumi DIY S3 state backend.
      AWS_ACCESS_KEY_ID: ${{ secrets.PULUMI_STATE_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.PULUMI_STATE_SECRET_ACCESS_KEY }}
      # Encrypts secrets in Pulumi state.
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      # DIY backend (Linode); pulumi reads this natively, no `pulumi login`.
      PULUMI_BACKEND_URL: s3://${{ vars.PULUMI_STATE_BUCKET || 'vvsplit-pulumi-state' }}?endpoint=${{ vars.PULUMI_STATE_ENDPOINT }}&region=us-east-1
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Stage dist/
        run: ./scripts/stage-assets.sh

      - name: Stamp CACHE_VERSION with commit SHA
        run: |
          sed -i "s|const CACHE_VERSION = '.*';|const CACHE_VERSION = 'vvsplit-${GITHUB_SHA::8}';|" dist/sw.js
          grep -n CACHE_VERSION dist/sw.js

      # The action installs the Pulumi CLI itself (no dependency on the
      # runner image) and upsert creates the stack on first deploy.
      # preview on dispatch+plan; up on push to main or dispatch+apply.
      - uses: pulumi/actions@v7
        with:
          command: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan') && 'preview' || 'up' }}
          stack-name: production
          upsert: true
          work-dir: infra
          cloud-url: ${{ env.PULUMI_BACKEND_URL }}
