name: Test

# Reusable: called by ci.yml (PR) and deploy.yml (push/dispatch). No secrets.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Syntax check
        run: |
          python -m py_compile main.py ui.py storage.py splitcore/*.py
          python -m py_compile infra/__main__.py
          node --check sw.js
          bash -n scripts/stage-assets.sh

      - name: Unit tests
        run: python -m unittest discover -s tests

      - name: Service-worker tests
        run: node --test tests/test_sw.mjs

      - name: Deployment lock check
        run: python -m pip install --dry-run --require-hashes -r infra/requirements.txt
